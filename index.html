<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Aún no está acabado...</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    min-height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#16324f 0%,#090c18 45%,#02030a 100%);

    font-family:'Orbitron',sans-serif;
    position:relative;
}

/* ========================================
   FONDO RETRO
======================================== */

.grid{
    position:absolute;
    width:300%;
    height:300%;
    bottom:-180%;
    left:-100%;

    background:
    linear-gradient(rgba(91,213,255,0.18) 2px, transparent 2px),
    linear-gradient(90deg, rgba(91,213,255,0.18) 2px, transparent 2px);

    background-size:70px 70px;

    transform:
    perspective(1000px)
    rotateX(80deg);

    animation:gridMove 12s linear infinite;
}

@keyframes gridMove{

    from{
        transform:
        perspective(1000px)
        rotateX(80deg)
        translateY(0);
    }

    to{
        transform:
        perspective(1000px)
        rotateX(80deg)
        translateY(70px);
    }
}

.scanlines{
    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 2px,
        transparent 4px
    );

    pointer-events:none;
}

.stars{
    position:absolute;
    inset:0;

    background-image:
    radial-gradient(white 1px, transparent 1px);

    background-size:90px 90px;

    opacity:0.2;

    animation:stars 20s linear infinite;
}

@keyframes stars{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(100px);
    }
}

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(120px);
    opacity:0.45;
}

.glow1{
    width:350px;
    height:350px;
    background:#49c7ff;

    top:-100px;
    left:-100px;

    animation:pulse 5s infinite alternate;
}

.glow2{
    width:320px;
    height:320px;
    background:#ff9d2e;

    bottom:-120px;
    right:-120px;

    animation:pulse 4s infinite alternate;
}

@keyframes pulse{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.25);
    }
}

/* ========================================
   CONTENIDO
======================================== */

.container{
    position:relative;
    z-index:5;

    width:min(900px,90%);
    text-align:center;

    padding:60px 40px;

    border-radius:35px;

    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,0.10),
        rgba(255,255,255,0.04)
    );

    border:1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(12px);

    box-shadow:
    0 0 30px rgba(73,199,255,0.2),
    0 0 60px rgba(255,157,46,0.15);
}

/* ========================================
   TITULO
======================================== */

.title{
    font-family:'Press Start 2P',cursive;

    font-size:clamp(1.3rem,4vw,3rem);

    line-height:1.7;

    color:#fff4da;

    text-shadow:
    0 0 10px #49c7ff,
    0 0 25px #49c7ff,
    0 0 45px #49c7ff;

    animation:flicker 2.5s infinite;
}

@keyframes flicker{

    0%,18%,22%,25%,53%,57%,100%{
        opacity:1;
    }

    20%,24%,55%{
        opacity:0.6;
    }
}

.subtitle{

    margin-top:35px;

    font-size:1rem;

    color:#ffb25a;

    letter-spacing:3px;

    opacity:0.85;
}

/* ========================================
   BOTON
======================================== */

.portal-btn{

    margin-top:55px;

    display:inline-flex;
    align-items:center;
    justify-content:center;

    gap:14px;

    padding:22px 42px;

    border-radius:18px;

    text-decoration:none;

    color:white;

    font-size:1rem;
    font-weight:700;

    background:
    linear-gradient(
        135deg,
        #49c7ff,
        #1f8fff,
        #ff9d2e
    );

    background-size:300% 300%;

    box-shadow:
    0 0 25px rgba(73,199,255,0.45),
    0 0 45px rgba(255,157,46,0.25);

    transition:0.35s;

    animation:gradientMove 6s ease infinite;
}

.portal-btn:hover{

    transform:
    translateY(-8px)
    scale(1.05);

    box-shadow:
    0 0 35px rgba(73,199,255,0.7),
    0 0 70px rgba(255,157,46,0.35);
}

@keyframes gradientMove{

    0%{
        background-position:0% 50%;
    }

    50%{
        background-position:100% 50%;
    }

    100%{
        background-position:0% 50%;
    }
}

/* ========================================
   TEXTO FLOTANTE
======================================== */

.warning{

    position:absolute;

    color:rgba(255,255,255,0.06);

    font-size:clamp(2rem,7vw,7rem);

    font-weight:900;

    user-select:none;

    pointer-events:none;

    animation:floatText 12s linear infinite;
}

.warning.one{
    top:10%;
    left:-20%;
}

.warning.two{
    bottom:8%;
    right:-15%;
}

@keyframes floatText{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(120px);
    }
}

/* ========================================
   RESPONSIVE
======================================== */

@media(max-width:700px){

    .container{
        padding:40px 25px;
    }

    .portal-btn{
        width:100%;
        padding:20px;
    }

    .subtitle{
        font-size:0.85rem;
    }
}

</style>
</head>

<body>

<div class="grid"></div>
<div class="scanlines"></div>
<div class="stars"></div>

<div class="glow glow1"></div>
<div class="glow glow2"></div>

<div class="warning one">
    UNDER CONSTRUCTION
</div>

<div class="warning two">
    ERROR 404
</div>

<div class="container">

    <h1 class="title">
        AÚN NO ESTÁ ACABADO
        <br><br>
        VUELVE POR DONDE HAS VENIDO
    </h1>

    <p class="subtitle">
        EL PORTAL TODAVÍA ESTÁ EN CONSTRUCCIÓN...
    </p>

    <a class="portal-btn"
       href="https://igorhermoso1.github.io/IGORHALL/">

        ⬅ VOLVER AL IGOR HALL

    </a>

</div>

<script>

/* ========================================
   EFECTO PARALLAX
======================================== */

document.addEventListener("mousemove",(e)=>{

    const x = (window.innerWidth / 2 - e.clientX) / 40;
    const y = (window.innerHeight / 2 - e.clientY) / 40;

    document.querySelector(".container").style.transform =
    `rotateY(${-x}deg) rotateX(${y}deg)`;

});

/* ========================================
   TITULO DINAMICO
======================================== */

const titles = [
    "⚠ UNDER CONSTRUCTION ⚠",
    "VUELVE ATRÁS",
    "ERROR // PORTAL INCOMPLETO",
    "IGOR HALL"
];

let current = 0;

setInterval(()=>{

    document.title = titles[current];

    current++;

    if(current >= titles.length){
        current = 0;
    }

},2000);

</script>

</body>
</html>
